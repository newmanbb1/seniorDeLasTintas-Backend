services:
  # Base de datos para Evolution API y Chatbot
  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # Redis para Evolution API
  redis:
    image: redis:7
    container_name: app_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # Evolution API (WhatsApp)
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${DB_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_client
      CONFIG_SESSION_PHONE_CLIENT: "Chrome"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      QR_CODE_ON_CHAT: "true"
      DELETE_TOKEN_ON_DIE: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      # WEBHOOK_GLOBAL_URL: "http://backend:3000/api/chatbot/webhook"
      # WEBHOOK_GLOBAL_BY_EVENTS: "true"
      # WEBHOOK_EVENTS_ON_QRCODE_UPDATED: "true"
      # WEBHOOK_EVENTS_ON_CONNECTION_UPDATE: "true"
      # WEBHOOK_EVENTS_ON_MESSAGE_RECEIVED: "true"
      # WEBHOOK_EVENTS_ON_MESSAGES_UPSERT: "true"
    command: >
      bash -c "
        echo 'Iniciando Evolution API...' &&
        node dist/main.js
      "
    networks:
      - app_network
    volumes:
      - ./uploads:/app/uploads

  # Base de datos para el Negocio (Branch, Employee, Inventory, etc.)
  backend-db:
    image: postgres:15
    container_name: backend_postgres
    restart: always
    environment:
      POSTGRES_DB: TintasDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - backend_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # Backend NestJS (Negocio + Chatbot)
  backend:
    build: .
    container_name: backend_nestjs
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      backend-db:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - uploads_data:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend React (Nginx)
  frontend:
    build:
      context: ../frontend-senor-tintas
      args:
        VITE_API_URL: /api
    container_name: frontend_nginx
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  backend_data:
  uploads_data:

networks:
  app_network:
    driver: bridge

# Límites de recursos (aplica con docker stack deploy o --compatibility)
# x-deploy: &default-deploy
