services:
  # Base de datos para Evolution API y Chatbot
  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # Redis para Evolution API
  redis:
    image: redis:7
    container_name: app_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # Evolution API (WhatsApp)
  evolution:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: evolution_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${DB_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_client
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      CONFIG_SESSION_PHONE_CLIENT: "Señor de las Tintas"
      QR_CODE_LIMIT: 1
      QR_CODE_ON_CHAT: "true"
      DELETE_TOKEN_ON_DIE: "false"
      # Webhook apunta al backend NestJS
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://backend:3000/chatbot/webhook"
      WEBHOOK_GLOBAL_BY_EVENTS: "false"
      WEBHOOK_EVENTS_ON_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_ON_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_ON_MESSAGE_RECEIVED: "true"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1033893291"
    networks:
      - app_network

  # Base de datos para el Negocio (Branch, Employee, Inventory, etc.)
  backend-db:
    image: postgres:15
    container_name: backend_postgres
    restart: always
    environment:
      POSTGRES_DB: backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - backend_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # Backend NestJS (Negocio + Chatbot)
  backend:
    build: .
    container_name: backend_nestjs
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=backend-db
      - DB_PORT=5432
      - DB_NAME=backend
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - EVOLUTION_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - INSTANCE_NAME=${INSTANCE_NAME}
      - SYSTEM_AUDIT_USER_ID=00000000-0000-4000-8000-000000000001
    depends_on:
      backend-db:
        condition: service_healthy
      evolution:
        condition: service_started
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  app_network:
    driver: bridge